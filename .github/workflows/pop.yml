name: Weekly PSA pop

on:
  schedule:
    # 02:00 UTC Mondays = 10:00 Manila
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch PSA population
        run: python psa_pop.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pop_history.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: pop update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Sync to Google Sheets
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sheets_sync.py
