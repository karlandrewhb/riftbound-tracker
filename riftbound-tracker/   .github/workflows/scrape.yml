name: Daily Riftbound scrape
on:
  schedule:
    # 09:00 UTC daily = 17:00 Manila. Adjust the hour if you like.
    - cron: "0 9 * * *"
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab
permissions:
  contents: write      # needed to commit results back to the repo
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        run: python scraper.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sales_history.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: sales update $(date -u +%Y-%m-%d)"
            git push
          fi
      - name: Sync to Google Sheets
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sheets_sync.py
